apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name: build-and-push-image
spec:
  workspaces:
    - name: source
  params:
    - name: image-tag
      type: string
      description: The target registry destination URL for the container image
  steps:
    - name: build-image
      image: json-container-builder-placeholder
      workingDir: $(workspaces.source.path)
      script: |
        echo "Simulating image build from local Dockerfile layout..."
    - name: push-to-registry
      image: registry-uploader-placeholder
      script: |
        echo "Pushing built image layer directly to $(params.image-tag)..."
        echo "Image successfully verified and live on cloud environment."
