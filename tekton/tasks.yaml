apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name: run-jasmine-tests
spec:
  workspaces:
    - name: source
  steps:
    - name: install-deps
      image: node:18-alpine
      workingDir: $(workspaces.source.path)
      script: |
        npm install
    - name: run-tests
      image: node:18-alpine
      workingDir: $(workspaces.source.path)
      script: |
        npm test
